<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KRT TRADERS – Enterprise ERP System</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Google Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- ============================================================
    LOGIN PAGE
    ============================================================ -->
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="fas fa-cubes"></i>
                </div>
                <h1>KRT TRADERS</h1>
                <p>Enterprise ERP System</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="loginUsername" class="form-control" placeholder="Enter username" value="admin" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" value="admin123" required />
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <div class="login-footer">
                Default: <span>admin</span> / <span>admin123</span>
            </div>
        </div>
    </div>

    <!-- ============================================================
    MAIN APP
    ============================================================ -->
    <div id="app" style="display:none;">
        
        <!-- ===== SIDEBAR ===== -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-icon">K</div>
                    <div>
                        <span class="brand-text">KRT</span>
                        <span class="brand-sub">Enterprise</span>
                    </div>
                </div>
                <button id="toggleSidebar" class="sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-label">Main Menu</div>
                <ul>
                    <li class="active" data-page="dashboard">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </li>
                    <li data-page="stock-in">
                        <i class="fas fa-arrow-down"></i>
                        <span>Stock IN</span>
                    </li>
                    <li data-page="stock-out">
                        <i class="fas fa-arrow-up"></i>
                        <span>Stock OUT</span>
                    </li>
                    <li data-page="stock-balance">
                        <i class="fas fa-balance-scale"></i>
                        <span>Stock Balance</span>
                    </li>
                </ul>

                <div class="nav-label" style="margin-top:12px;">Reports</div>
                <ul>
                    <li data-page="daily-report">
                        <i class="fas fa-calendar-day"></i>
                        <span>Daily Report</span>
                    </li>
                    <li data-page="ledger">
                        <i class="fas fa-book"></i>
                        <span>Ledger</span>
                    </li>
                    <li data-page="reports">
                        <i class="fas fa-chart-bar"></i>
                        <span>Reports</span>
                    </li>
                </ul>

                <div class="nav-label" style="margin-top:12px;">System</div>
                <ul>
                    <li data-page="search">
                        <i class="fas fa-search"></i>
                        <span>Search</span>
                    </li>
                    <li data-page="settings">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </li>
                    <li data-page="backup">
                        <i class="fas fa-database"></i>
                        <span>Backup</span>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="sync-status-box">
                    <div>
                        <span class="sync-dot offline" id="syncDot"></span>
                        <span class="sync-label" id="syncLabel">Offline</span>
                    </div>
                    <span class="sync-time" id="lastSyncTime">Never</span>
                </div>
                <button id="logoutBtn" class="logout-btn-sidebar">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main id="main-content">

            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <h2 id="pageTitle">Dashboard</h2>
                    <span class="page-indicator" id="currentDateTime"></span>
                </div>
                <div class="header-right">
                    <div class="search-bar-top">
                        <input type="text" id="globalSearchInput" placeholder="Search anything..." />
                        <button id="globalSearchBtn"><i class="fas fa-search"></i></button>
                    </div>
                    <div class="user-profile">
                        <span class="user-name" id="userNameDisplay">Admin</span>
                        <div class="user-avatar" id="userAvatar">A</div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <section id="pageContent">
                <!-- Dynamic content loads here -->
            </section>

        </main>
    </div>

    <!-- ===== TOAST CONTAINER ===== -->
    <div id="toastContainer"></div>

    <!-- ===== MODAL CONTAINER ===== -->
    <div id="modalContainer"></div>

    <!-- ============================================================
    SCRIPTS
    ============================================================ -->
    <script src="js/app.js"></script>

</body>
</html>
