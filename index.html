<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KRT TRADERS – ERP System</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

    <!-- ===== APP CONTAINER ===== -->
    <div id="app">

        <!-- ===== SIDEBAR ===== -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-cubes"></i>
                    <span>KRT</span>
                </div>
                <button id="toggleSidebar" class="toggle-btn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="active" data-page="dashboard">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </li>
                    <li data-page="stock-in">
                        <i class="fas fa-arrow-down"></i>
                        <span>Stock IN</span>
                    </li>
                    <li data-page="stock-out">
                        <i class="fas fa-arrow-up"></i>
                        <span>Stock OUT</span>
                    </li>
                    <li data-page="stock-balance">
                        <i class="fas fa-balance-scale"></i>
                        <span>Stock Balance</span>
                    </li>
                    <li data-page="daily-report">
                        <i class="fas fa-calendar-day"></i>
                        <span>Daily Report</span>
                    </li>
                    <li data-page="ledger">
                        <i class="fas fa-book"></i>
                        <span>Ledger</span>
                    </li>
                    <li data-page="reports">
                        <i class="fas fa-chart-bar"></i>
                        <span>Reports</span>
                    </li>
                    <li data-page="search">
                        <i class="fas fa-search"></i>
                        <span>Search</span>
                    </li>
                    <li data-page="settings">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </li>
                    <li data-page="backup">
                        <i class="fas fa-database"></i>
                        <span>Backup</span>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="sync-status">
                    <span id="syncIndicator" class="sync-offline">
                        <i class="fas fa-cloud"></i> Offline
                    </span>
                    <span id="lastSyncTime">Never</span>
                </div>
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main id="main-content">

            <!-- ===== TOP HEADER ===== -->
            <header class="top-header">
                <div class="header-left">
                    <h2 id="pageTitle">Dashboard</h2>
                    <span id="currentDateTime" class="datetime"></span>
                </div>
                <div class="header-right">
                    <div class="search-bar">
                        <input type="text" id="globalSearchInput" placeholder="Search..." />
                        <button id="globalSearchBtn"><i class="fas fa-search"></i></button>
                    </div>
                    <div class="user-info">
                        <span id="userNameDisplay">Admin</span>
                        <img src="https://ui-avatars.com/api/?name=Admin&background=4F46E5&color=fff&size=40" alt="Avatar" />
                    </div>
                </div>
            </header>

            <!-- ===== PAGE CONTENT ===== -->
            <section id="pageContent">
                <!-- Pages will be dynamically loaded here -->
            </section>

        </main>
    </div>

    <!-- ===== TOAST CONTAINER ===== -->
    <div id="toastContainer"></div>

    <!-- ===== MODAL CONTAINER ===== -->
    <div id="modalContainer"></div>

    <!-- ===== SCRIPTS ===== -->
    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/stock-in.js"></script>
    <script src="js/stock-out.js"></script>
    <script src="js/stock-balance.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/ledger.js"></script>
    <script src="js/search.js"></script>
    <script src="js/printing.js"></script>
    <script src="js/barcode.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/backup.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
